    />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="nqui demo — release console UI built with Vite, TypeScript, and @nqlib/nqui." />
    <title>nqui — release console demo</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
